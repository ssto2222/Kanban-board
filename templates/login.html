<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StickyKanban — ログイン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #12122a;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      background: #1a1a3a;
      border: 1px solid #2a2a5a;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      padding: 36px 32px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .login-logo {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 28px;
      letter-spacing: 0.02em;
    }

    .tab-row {
      display: flex;
      border-bottom: 2px solid #2a2a5a;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #888;
      font-size: 14px;
      font-weight: bold;
      padding: 10px 0 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      background: #0d0d22;
      border: 1px solid #2a2a5a;
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #e94560; }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: #c73652; }

    .error-msg {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.4);
      color: #e94560;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .guest-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 12px;
      text-decoration: none;
    }

    .guest-link:hover { color: #aaa; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🗒 StickyKanban</div>

    <div class="tab-row">
      <button class="tab-btn {% if mode == 'login' %}active{% endif %}" id="tab-login">ログイン</button>
      <button class="tab-btn {% if mode == 'register' %}active{% endif %}" id="tab-register">新規登録</button>
    </div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <!-- ログインフォーム -->
    <form class="form-section {% if mode == 'login' %}active{% endif %}" id="form-login"
          method="POST" action="/login">
      <div class="field">
        <label>ユーザー名</label>
        <input type="text" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="btn-submit" type="submit">ログイン</button>
    </form>

    <!-- 新規登録フォーム -->
    <form class="form-section {% if mode == 'register' %}active{% endif %}" id="form-register"
          method="POST" action="/register">
      <div class="field">
        <label>ユーザー名（英数字3文字以上）</label>
        <input type="text" name="username" autocomplete="username" required minlength="3"
               pattern="[a-zA-Z0-9_\-]+" title="英数字・アンダースコア・ハイフンのみ">
      </div>
      <div class="field">
        <label>表示名（日本語可）</label>
        <input type="text" name="display_name" autocomplete="nickname" placeholder="例: 田中太郎">
      </div>
      <div class="field">
        <label>パスワード（6文字以上）</label>
        <input type="password" name="password" autocomplete="new-password" required minlength="6">
      </div>
      <div class="field">
        <label>パスワード（確認）</label>
        <input type="password" name="confirm" autocomplete="new-password" required>
      </div>
      <button class="btn-submit" type="submit">登録してはじめる</button>
    </form>

    <a class="guest-link" href="/">ゲストとしてボードを見る</a>
  </div>

  <script>
    const tabLogin    = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const formLogin   = document.getElementById('form-login');
    const formRegister = document.getElementById('form-register');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      formLogin.classList.add('active');
      formRegister.classList.remove('active');
    });

    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      formRegister.classList.add('active');
      formLogin.classList.remove('active');
    });
  </script>
</body>
</html>
