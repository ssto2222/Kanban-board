<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏗 高所作業車 配置図</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/aerial.css">
</head>
<body>
  <div class="app aerial-app">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="logo">🏗 高所作業車 配置図</h1>
        <nav class="nav-tabs">
          <a href="/" class="nav-tab">🗒 カンバン</a>
          <a href="/aerial" class="nav-tab active">🏗 配置図</a>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="total-info">合計 <strong id="total-count">0</strong> 台</span>
        <button class="btn btn-primary" id="btn-new">＋ 追加</button>
      </div>
    </header>

    <main class="aerial-board" id="board">
      <!-- Floors 8F → 1F rendered by aerial.js -->
    </main>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modal-title">高所作業車 追加</h2>
      <input type="hidden" id="lift-id">

      <div class="field">
        <label>車両名 <span class="req">*</span></label>
        <input type="text" id="lift-name" placeholder="例: 高所作業車 01">
      </div>
      <div class="field">
        <label>配置階</label>
        <select id="lift-floor">
          <option value="8">8F</option>
          <option value="7">7F</option>
          <option value="6">6F</option>
          <option value="5">5F</option>
          <option value="4">4F</option>
          <option value="3">3F</option>
          <option value="2">2F</option>
          <option value="1">1F</option>
        </select>
      </div>
      <div class="field">
        <label>オペレーター</label>
        <input type="text" id="lift-operator" placeholder="担当者名">
      </div>
      <div class="field">
        <label>備考</label>
        <input type="text" id="lift-note" placeholder="備考を入力">
      </div>
      <div class="field">
        <label>カードの色</label>
        <div class="color-row">
          <input type="color" id="lift-color" value="#FFD166">
          <div id="swatches"></div>
        </div>
      </div>

      <div class="modal-btns">
        <button class="btn btn-cancel" id="btn-cancel">キャンセル</button>
        <div class="modal-btns-right">
          <button class="btn btn-danger" id="btn-delete" style="display:none">削除</button>
          <button class="btn btn-primary" id="btn-save">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/aerial.js"></script>
</body>
</html>
